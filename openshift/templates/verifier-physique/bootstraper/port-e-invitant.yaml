######################################################################
# oc process -f ./port-e-invitant.yaml --param-file=./port-e-invitant.param.env | oc apply -f -
######################################################################
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: ${APP_NAME}
  annotations:
    description: 
    tags: CQEN, SQIN, ING, Hyperledger, ARIES, Indy
objects:
######################################################################
# NestJS Invitant
######################################################################
- kind: ImageStream
  apiVersion: v1
  metadata:
    name: ${INVITANT_NAME}
    labels:
      app: ${INVITANT_NAME}
      app.kubernetes.io/part-of: ${APP_NAME}

- kind: BuildConfig
  apiVersion: v1
  metadata:
    annotations:
      app.openshift.io/vcs-uri: ${GITHUB_REPOSITORY_URI}
      template.alpha.openshift.io/wait-for-ready: "true"
    labels:
      app: ${INVITANT_NAME}
      app.kubernetes.io/part-of: ${APP_NAME}
    name: ${INVITANT_NAME}
  spec:
    output:
      to:
        kind: ImageStreamTag
        name: ${INVITANT_NAME}:latest
    source:
      contextDir: ${CONTEXT_SOURCE_DIR}
      git:
        uri: ${GITHUB_REPOSITORY_URI}
        ref: ${GIT_REF}
      type: Git
    strategy:
      dockerStrategy:
        dockerfilePath: Dockerfile
      type: Docker
    triggers:
      - type: ConfigChange

- kind: DeploymentConfig
  apiVersion: v1
  metadata:
    name: ${INVITANT_NAME}
    labels:
      app: ${INVITANT_NAME}
      app.kubernetes.io/part-of: ${APP_NAME}
      app.kubernetes.io/runtime: nodejs
      app.kubernetes.io/name: nodejs
    annotations:
      description: Defines how to deploy the application server
      app.openshift.io/connects-to: >-
        {"apiVersion":"apps.openshift.io/v1","kind":"DeploymentConfig","name":"${CONTROLLER_NAME}"},
        {"apiVersion":"apps.openshift.io/v1","kind":"DeploymentConfig","name":"${AGENT_NAME}"}]
  spec:
    strategy:
      type: Rolling
      rollingParams:
        updatePeriodSeconds: 1
        intervalSeconds: 1
        timeoutSeconds: 600
        maxUnavailable: 25%
        maxSurge: 25%
      resources: {}
      activeDeadlineSeconds: 21600
    triggers:
      - type: ConfigChange
      - type: ImageChange
        imageChangeParams:
          automatic: true
          containerNames:
            - ${INVITANT_NAME}
          from:
            kind: ImageStreamTag
            name: "${INVITANT_NAME}:latest"
    replicas: 1
    revisionHistoryLimit: 10
    test: false
    selector:
      app: ${INVITANT_NAME}
    template:
      metadata:
        labels:
          app: ${INVITANT_NAME}
      spec:
        containers:
        # env-file: .env
        - env:
          - name: MODE
            value: DEV
          - name: BASE_URL
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-invite
                key: base-url
          - name: BASE_SHORT_URL
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-invite
                key: base-short-url
          - name: ENDPOINT_CONNECTION
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-invite
                key: endpoint-connection
          - name: ENDPOINT_INVITATION
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-invite
                key: endpoint-invitation
          - name: X_API_KEY
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-invite
                key: x-api-key
          - name: APP_PORT
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-invite
                key: app-port
          - name: WEBHOOK_URL
            value: ${WEBHOOK_URL}
          - name: AGENT_URL
            value: ${AGENT_URL}
          - name: AGENT_API_KEY
            value: ${AGENT_API_KEY}
          - name: RUN_MIGRATIONS
            value: "false"
          name: ${INVITANT_NAME}
          image: " "
          ports:
            - containerPort: 3000
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
        restartPolicy: Always
        terminationGracePeriodSeconds: 30
        dnsPolicy: ClusterFirst
        securityContext: {}
        schedulerName: default-scheduler

- kind: Service
  apiVersion: v1
  metadata:
    name: ${INVITANT_NAME}
    labels:
      app: ${INVITANT_NAME}
      app.kubernetes.io/part-of: ${APP_NAME}
  spec:
    selector:
      app: ${INVITANT_NAME}
    ports:
      - name: "3000"
        protocol: TCP
        port: 3000
        targetPort: 3000

- kind: Route
  apiVersion: route.openshift.io/v1
  metadata:
      name: invitant
      namespace: exp-port-e-1-flihp
  spec:
      host: ${APP_SUBDOMAIN}.${APP_DOMAIN}
      port:
        targetPort: 3000
      tls:
        insecureEdgeTerminationPolicy: Redirect
        termination: edge
      to:
        kind: Service
        name: port-e-invitant


